services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edd-example-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    command: php artisan serve --host=0.0.0.0 --port=8000

  db:
    image: mysql:8.4
    container_name: edd-example-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: edd_example
      MYSQL_USER: edd_user
      MYSQL_PASSWORD: edd_password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
